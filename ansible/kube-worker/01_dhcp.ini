[ips]
kube-worker1 ansible_host=192.168.0.105  set_static_ip=192.168.0.21
kube-worker2 ansible_host=192.168.0.106  set_static_ip=192.168.0.22

[ips:vars]
ansible_user=user
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_ssh_extra_args='-o ConnectTimeout=5 -o ConnectionAttempts=1'
ansible_become_method=sudo
ansible_python_interpreter=/usr/bin/python3