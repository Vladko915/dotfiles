---
- hosts: core
  become: true
  gather_facts: false

  tasks:
    - name: Copy kubernetes sysctl config
      ansible.builtin.copy:
        src: ../core-kube/99-kubernetes.conf
        dest: /etc/sysctl.d/99-kubernetes.conf
        owner: root
        group: root
        mode: '0644'

    - name: Load br_netfilter module
      command: modprobe br_netfilter

    - name: Add br_netfilter to modules-load
      ansible.builtin.shell: echo "br_netfilter" | tee /etc/modules-load.d/br_netfilter.conf
      changed_when: true

    - name: Apply sysctl settings
      command: sysctl --system

    - name: Check ip_forward
      command: cat /proc/sys/net/ipv4/ip_forward
      register: ip_forward
      changed_when: false

    - name: Show ip_forward value
      debug:
        msg: "ip_forward: {{ ip_forward.stdout }}"