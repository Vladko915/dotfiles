[core]
kube-control1 ansible_host=192.168.0.119  new_hostname=kube-control1
kube-worker1  ansible_host=192.168.0.120  new_hostname=kube-worker1
kube-worker2  ansible_host=192.168.0.121  new_hostname=kube-worker2


[core:vars]
ansible_user=user
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_ssh_extra_args='-o ConnectTimeout=5 -o ConnectionAttempts=1'
ansible_become_method=sudo
ansible_python_interpreter=/usr/bin/python3


