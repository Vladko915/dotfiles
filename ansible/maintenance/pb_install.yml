---
- hosts: core
  become: true
  gather_facts: false
  #serial: 1
  tasks:
    - name: apt-get update
      apt:
        update_cache: yes

    - name: apt-get upgrade
      apt:
        upgrade: full

    - name: Install required packages
      apt:
        name:
          - tree
        state: present

    - name: Run command, bash>tree
      ansible.builtin.shell:
        cmd: bash -i -c 'tree'
      args:
        executable: /bin/bash
      register: res

    - name: Show output
      ansible.builtin.debug:
        msg: "{{ res.stdout }}"