- name: Change hostname interactively
  hosts: all
  become: true
  gather_facts: false
  serial: 1                    # виконує по одному хосту за раз

  tasks:
    - name: Get current hostname (before)
      ansible.builtin.command: hostname
      register: hostname_before
      changed_when: false

    - name: Get current IP (before)
      ansible.builtin.command: hostname -I
      register: ip_before
      changed_when: false

    - name: Show current hostname and IP (before)
      ansible.builtin.debug:
        msg: "current-hostname: {{ hostname_before.stdout }}, {{ ip_before.stdout | trim }}"

    - name: Ask for new hostname
      ansible.builtin.pause:
        prompt: "\nPlease, enter new hostname for {{ ip_before.stdout | trim }}"
      register: pause_result

    - name: Set new hostname
      ansible.builtin.hostname:
        name: "{{ pause_result.user_input }}"

    - name: Get current hostname (after)
      ansible.builtin.command: hostname
      register: hostname_after
      changed_when: false

    - name: Get current IP (after)
      ansible.builtin.command: hostname -I
      register: ip_after
      changed_when: false

    - name: Show current hostname and IP (after)
      ansible.builtin.debug:
        msg: "updated-hostname: {{ hostname_after.stdout }}, {{ ip_after.stdout | trim }}"