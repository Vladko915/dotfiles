- name: Change hostname
  hosts: all
  become: true
  gather_facts: false
  # без serial — працює паралельно

  tasks:
    - name: Get current hostname (before)
      ansible.builtin.command: hostname
      register: hostname_before
      changed_when: false

    - name: Get current IP (before)
      ansible.builtin.command: hostname -I
      register: ip_before
      changed_when: false

    - name: Show current hostname and IP (before)
      ansible.builtin.debug:
        msg: "current-hostname: {{ hostname_before.stdout }}, {{ ip_before.stdout | trim }}"

    - name: Set new hostname
      ansible.builtin.hostname:
        name: "{{ new_hostname }}"

    - name: Get current hostname (after)
      ansible.builtin.command: hostname
      register: hostname_after
      changed_when: false

    - name: Get current IP (after)
      ansible.builtin.command: hostname -I
      register: ip_after
      changed_when: false

    - name: Update /etc/hosts
      ansible.builtin.shell: sed -i 's/127.0.1.1 {{ hostname_before.stdout }}/127.0.1.1 {{ hostname_after.stdout }}/' /etc/hosts
      changed_when: true

    - name: Show current hostname and IP (after)
      ansible.builtin.debug:
        msg: "updated-hostname: {{ hostname_after.stdout }}, {{ ip_after.stdout | trim }}"