[core]
kube-core1 ansible_host=192.168.0.108  new_hostname=kube-core1
kube-core2 ansible_host=192.168.0.111  new_hostname=kube-core2

[core:vars]
ansible_user=user
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_ssh_extra_args='-o ConnectTimeout=5 -o ConnectionAttempts=1'
ansible_become_method=sudo
ansible_python_interpreter=/usr/bin/python3


